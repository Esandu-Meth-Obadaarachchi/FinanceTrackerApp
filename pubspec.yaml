name: financialtracker
description: "FinTrack — a personal financial tracker with cloud sync."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1

  # Sharing / exporting CSV
  share_plus: ^10.1.2

  # Local preferences (theme)
  shared_preferences: ^2.3.3

  # Google sign-in
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
